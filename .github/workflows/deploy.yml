name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow only one concurrent deployment per branch, cancelling in-progress runs.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # push to main -> "main" (production); pull_request -> PR branch (preview).
          DEPLOY_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          # Create the Pages project on first run; ignore the error if it already exists.
          npx --yes wrangler@4 pages project create horrolive \
            --production-branch=main \
            || echo "Pages project 'horrolive' already exists — continuing."

          npx --yes wrangler@4 pages deploy dist \
            --project-name=horrolive \
            --branch="$DEPLOY_BRANCH" \
            --commit-dirty=true
